<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="weather-favicon.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="media.css">
</head>
<body>
    <div class="container">
        <header class="top-bar">
            <div>
                <h1>Weather Dashboard</h1>
                <p>Live Weather Updates Worldwide</p>
            </div>

            <button id="themeBtn">
                <i class="fas fa-moon"></i>
            </button>
        </header>
        <section class="search-box">
            <input type="text" id="city" placeholder="Enter city name">
            <button id="searchBtn">Search</button>
        </section>

        <section class="datetime">
            <div id="date"></div>
            <div id="time"></div>
        </section>

        <main class="main-content">
            <aside class="history-box">
                <h3>Recent Searches</h3>
                <ul id="historyList">
                   
                </ul>
            </aside>

            <article class="weather-card">
                <h2 id="cityName">Search City</h2>

                <img src="" alt="weather-icon" id="weatherIcon" hidden>
                <h1 id="temperature">--</h1>
                <p id="condition">Weather Condition</p>

                <div class="weather-info">
                    <div>
                       Humidity :
                       <span id="humidity"></span>
                    </div>

                    <div>
                        Wind :
                        <span id="wind"></span>
                    </div>

                </div>
            </article>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
